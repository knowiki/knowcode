name: Build Standalone Executables

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload installers/binaries to (e.g., v0.1.10). If empty, files are only uploaded as workflow run artifacts.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-executables:
    name: Build Standalone Executables
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: know.exe
            binary_release_name: knowcode-windows-x64.exe
            installer_release_name: knowcode-windows-installer.exe
          - os: macos-latest
            artifact_name: know
            binary_release_name: knowcode-macos-arm64
            installer_release_name: knowcode-macos-installer.pkg
          - os: ubuntu-latest
            artifact_name: know
            binary_release_name: knowcode-linux-x64
            installer_release_name: knowcode-linux-installer.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CLI and PyInstaller
        run: |
          pip install .
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller know.spec

      - name: Copy standalone binary for release
        shell: bash
        run: |
          cp dist/${{ matrix.artifact_name }} dist/${{ matrix.binary_release_name }}

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: iscc knowcode.iss

      - name: Build macOS Installer
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp dist/know pkg-root/usr/local/bin/know
          pkgbuild --identifier in.knowiki.knowcode \
                   --version 0.1.10 \
                   --root pkg-root \
                   dist/knowcode-macos-installer.pkg

      - name: Build Linux Installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb-root/usr/local/bin deb-root/DEBIAN
          cp dist/know deb-root/usr/local/bin/know
          cat <<EOF > deb-root/DEBIAN/control
          Package: knowcode
          Version: 0.1.10
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: KnowCode Team <info@knowiki.in>
          Description: Structural cognition engine for code repositories
          EOF
          dpkg-deb --build deb-root dist/knowcode-linux-installer.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowcode-${{ matrix.os }}
          path: |
            dist/${{ matrix.binary_release_name }}
            dist/${{ matrix.installer_release_name }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '') || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            dist/${{ matrix.binary_release_name }}
            dist/${{ matrix.installer_release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
