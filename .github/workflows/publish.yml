name: Publish KnowCode

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  build-binaries:
    name: Build & Publish NPM Binaries
    strategy:
      matrix:
        include:
          - os: windows-latest
            pkg_name: "@knowiki/knowcode-win32-x64"
            npm_os: win32
            npm_cpu: x64
            artifact_name: know.exe
          - os: macos-latest
            pkg_name: "@knowiki/knowcode-darwin-arm64"
            npm_os: darwin
            npm_cpu: arm64
            artifact_name: know
          - os: ubuntu-latest
            pkg_name: "@knowiki/knowcode-linux-x64"
            npm_os: linux
            npm_cpu: x64
            artifact_name: know
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - name: Install CLI and PyInstaller
        run: |
          pip install .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller know.spec
      - name: Prepare NPM package
        shell: bash
        run: |
          mkdir -p npm-binary-pkg/bin
          mv dist/${{ matrix.artifact_name }} npm-binary-pkg/bin/
          cat <<EOF > npm-binary-pkg/package.json
          {
            "name": "${{ matrix.pkg_name }}",
            "version": "0.1.10",
            "description": "Platform specific binary for KnowCode",
            "os": [
              "${{ matrix.npm_os }}"
            ],
            "cpu": [
              "${{ matrix.npm_cpu }}"
            ],
            "author": "KnowCode Team",
            "license": "MIT"
          }
          EOF
      - name: Publish to NPM
        working-directory: npm-binary-pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-npm-wrapper:
    name: Publish NPM Wrapper
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - name: Publish Wrapper
        working-directory: npm/knowcode
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  build-standalone-executables:
    name: Build Standalone Executables
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: know.exe
            binary_release_name: knowcode-windows-x64.exe
            installer_release_name: knowcode-windows-installer.exe
          - os: macos-latest
            artifact_name: know
            binary_release_name: knowcode-macos-arm64
            installer_release_name: knowcode-macos-installer.pkg
          - os: ubuntu-latest
            artifact_name: know
            binary_release_name: knowcode-linux-x64
            installer_release_name: knowcode-linux-installer.deb
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install CLI and PyInstaller
        run: |
          pip install .
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller know.spec
      - name: Copy standalone binary for release
        shell: bash
        run: |
          cp dist/${{ matrix.artifact_name }} dist/${{ matrix.binary_release_name }}
      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: iscc knowcode.iss
      - name: Build macOS Installer
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp dist/know pkg-root/usr/local/bin/know
          pkgbuild --identifier in.knowiki.knowcode \
                   --version 0.1.10 \
                   --root pkg-root \
                   dist/knowcode-macos-installer.pkg
      - name: Build Linux Installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb-root/usr/local/bin deb-root/DEBIAN
          cp dist/know deb-root/usr/local/bin/know
          cat <<EOF > deb-root/DEBIAN/control
          Package: knowcode
          Version: 0.1.10
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: KnowCode Team <info@knowiki.in>
          Description: Structural cognition engine for code repositories
          EOF
          dpkg-deb --build deb-root dist/knowcode-linux-installer.deb
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowcode-${{ matrix.os }}
          path: |
            dist/${{ matrix.binary_release_name }}
            dist/${{ matrix.installer_release_name }}
          if-no-files-found: error
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.binary_release_name }}
            dist/${{ matrix.installer_release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

